name: rss-to-twitter
on:
  workflow_run:
    workflows: ["Publish OhGoshGit"]
    types:
      - completed
    branches:
      - main
  schedule:
    # every 60 minutes at hh:00:00
    - cron: "0 * * * *"
  workflow_dispatch:
jobs:
  twitter:
    # only run when triggered manually/scheduled, or when the publish workflow succeeded
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Wait for gh-pages to serve the updated RSS
        if: ${{ github.event_name == 'workflow_run' }}
        run: sleep 60
      - uses: azu/rss-to-twitter@v2
        with:
          RSS_URL: "https://ohgoshgit.github.io/index.xml"
          TWEET_TEMPLATE: 'New Post: "%title%" %url%'
          UPDATE_WITHIN_MINUTES: 1500 # post items that are published within 60 * 30 minutes
          TWITTER_APIKEY: ${{ secrets.TWITTER_APIKEY }}
          TWITTER_APIKEY_SECRET: ${{ secrets.TWITTER_APIKEY_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
